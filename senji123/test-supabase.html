<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #00ff00; color: #000; }
        .error { background: #ff0000; color: #fff; }
        .info { background: #00aaff; color: #000; }
        button {
            background: #00ff00;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        input {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Supabase 连接测试</h1>
    <div id="results"></div>
    
    <h2>配置信息</h2>
    <p>URL: https://kltgecxywsajonxjsawz.supabase.co</p>
    <p>Key: sb_publishable_3C8V8U4lPZUQ0xDYFzBLWA_2I_yR6q8</p>
    
    <h2>测试操作</h2>
    <input type="email" id="testEmail" placeholder="测试邮箱" value="test@example.com">
    <input type="password" id="testPassword" placeholder="测试密码" value="test123456">
    <button onclick="testConnection()">测试连接</button>
    <button onclick="testRegister()">测试注册</button>
    <button onclick="testLogin()">测试登录</button>
    <button onclick="testLogout()">测试登出</button>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kltgecxywsajonxjsawz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_3C8V8U4lPZUQ0xDYFzBLWA_2I_yR6q8';
        
        let supabase = null;
        
        function addResult(message, type) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.insertBefore(div, results.firstChild);
        }
        
        function initSupabase() {
            addResult('开始初始化 Supabase...', 'info');
            
            if (typeof window.supabase === 'undefined') {
                addResult('错误：Supabase SDK 未加载', 'error');
                return false;
            }
            
            if (typeof window.supabase !== 'function') {
                addResult('错误：window.supabase 不是函数', 'error');
                return false;
            }
            
            if (typeof window.supabase.createClient !== 'function') {
                addResult('错误：window.supabase.createClient 不是函数', 'error');
                return false;
            }
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                addResult('Supabase 客户端创建成功', 'success');
                return true;
            } catch (err) {
                addResult('创建 Supabase 客户端失败: ' + err.message, 'error');
                return false;
            }
        }
        
        async function testConnection() {
            addResult('测试 Supabase 连接...', 'info');
            
            if (!supabase) {
                if (!initSupabase()) {
                    return;
                }
            }
            
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) {
                    addResult('获取会话失败: ' + error.message, 'error');
                } else {
                    addResult('连接成功！当前会话: ' + (data.session ? '已登录' : '未登录'), 'success');
                }
            } catch (err) {
                addResult('连接测试失败: ' + err.message, 'error');
            }
        }
        
        async function testRegister() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            addResult(`尝试注册: ${email}`, 'info');
            
            if (!supabase) {
                if (!initSupabase()) {
                    return;
                }
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username: 'testuser'
                        }
                    }
                });
                
                if (error) {
                    addResult('注册失败: ' + error.message, 'error');
                } else {
                    addResult('注册成功！', 'success');
                    if (data.user) {
                        addResult('用户ID: ' + data.user.id, 'success');
                    }
                }
            } catch (err) {
                addResult('注册异常: ' + err.message, 'error');
            }
        }
        
        async function testLogin() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            addResult(`尝试登录: ${email}`, 'info');
            
            if (!supabase) {
                if (!initSupabase()) {
                    return;
                }
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    addResult('登录失败: ' + error.message, 'error');
                } else {
                    addResult('登录成功！', 'success');
                    if (data.session) {
                        addResult('会话已创建', 'success');
                    }
                }
            } catch (err) {
                addResult('登录异常: ' + err.message, 'error');
            }
        }
        
        async function testLogout() {
            addResult('尝试登出...', 'info');
            
            if (!supabase) {
                addResult('Supabase 未初始化', 'error');
                return;
            }
            
            try {
                const { error } = await supabase.auth.signOut();
                if (error) {
                    addResult('登出失败: ' + error.message, 'error');
                } else {
                    addResult('登出成功！', 'success');
                }
            } catch (err) {
                addResult('登出异常: ' + err.message, 'error');
            }
        }
        
        // 页面加载时自动测试连接
        window.addEventListener('load', () => {
            setTimeout(() => {
                addResult('页面加载完成，开始初始化...', 'info');
                initSupabase();
            }, 1000);
        });
    </script>
</body>
</html>
